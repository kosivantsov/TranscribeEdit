name: Build Releases

on:
  push:
    tags:
      - 'v*' # Triggers when a version tag is pushed (e.g., v1.0.0)
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  build-windows:
    name: Build Windows (Lean & Full)
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # PyQt5 is highly stable on 3.10

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows Lean (No Deps)
        run: |
          pyinstaller --noconsole --onefile --name "TranscribeEdit-Lean" ^
            --icon="icons/transcribeedit.ico" ^
            --add-data "icons;icons" ^
            --add-data "translations;translations" ^
            --hidden-import mpv ^
            main.py

      - name: Download Windows External Dependencies (FFmpeg & mpv)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin
          
          # Download FFmpeg
          Write-Host "Downloading FFmpeg..."
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_temp
          Copy-Item ffmpeg_temp/*/bin/ffmpeg.exe bin/
          Copy-Item ffmpeg_temp/*/bin/ffprobe.exe bin/
          
          # Download MPV
          # Note: We fetch the latest release from zhongfly, which contains libmpv
          Write-Host "Downloading MPV..."
          $mpvRelease = Invoke-RestMethod -Uri "https://api.github.com/repos/zhongfly/mpv-winbuild/releases/latest"
          $mpvAsset = $mpvRelease.assets | Where-Object { $_.name -match "mpv-dev-x86_64-.*\.7z" } | Select-Object -First 1
          Invoke-WebRequest -Uri $mpvAsset.browser_download_url -OutFile "mpv.7z"
          
          # Extract using 7z (pre-installed on windows-latest runners)
          7z e mpv.7z *-dev/libmpv-2.dll -obin
          Rename-Item bin/libmpv-2.dll mpv-2.dll

      - name: Build Windows Full (Bundled Deps)
        run: |
          pyinstaller --noconsole --onefile --name "TranscribeEdit-Full" ^
            --icon="icons/transcribeedit.ico" ^
            --add-binary "bin/ffmpeg.exe;bin" ^
            --add-binary "bin/ffprobe.exe;bin" ^
            --add-binary "bin/mpv-2.dll;bin" ^
            --add-data "icons;icons" ^
            --add-data "translations;translations" ^
            --hidden-import mpv ^
            main.py

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TranscribeEdit-Windows
          path: dist/*.exe

  build-macos:
    name: Build macOS (Universal)
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS App
        run: |
          # --target-arch universal2 creates a fat binary for Intel + Apple Silicon
          pyinstaller --noconsole --windowed --name "TranscribeEdit" \
            --target-arch universal2 \
            --icon="icons/transcribeedit.icns" \
            --add-data "icons:icons" \
            --add-data "translations:translations" \
            --hidden-import mpv \
            main.py
          
          # Compress the .app bundle to preserve symlinks and permissions
          cd dist
          zip -ry TranscribeEdit-macOS-Universal.zip TranscribeEdit.app

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TranscribeEdit-macOS
          path: dist/TranscribeEdit-macOS-Universal.zip

  build-linux:
    name: Build Linux AppImage (${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
          - arch: aarch64
            runner: ubuntu-24.04-arm # GitHub's native ARM runner for public repos
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx libegl1-mesa libxcb-xinerama0 curl file fuse
          
          # Install FUSE which is required by appimagetool
          sudo add-apt-repository universe
          sudo apt install libfuse2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build PyInstaller Folder
        run: |
          pyinstaller --noconsole --name "TranscribeEdit" \
            --add-data "icons:icons" \
            --add-data "translations:translations" \
            --hidden-import mpv \
            main.py

      - name: Create AppImage Structure
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          
          # Copy PyInstaller output to the AppDir
          cp -r dist/TranscribeEdit/* AppDir/usr/bin/
          
          # Setup Desktop File and Icon
          cp icons/transcribeedit.png AppDir/TranscribeEdit.png
          cp icons/transcribeedit.png AppDir/.DirIcon
          
          cat << 'EOF' > AppDir/TranscribeEdit.desktop
          [Desktop Entry]
          Name=TranscribeEdit
          Exec=AppRun
          Icon=TranscribeEdit
          Type=Application
          Categories=AudioVideo;
          Terminal=false
          EOF
          
          cat << 'EOF' > AppDir/AppRun
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "${0}")")"
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/bin:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/TranscribeEdit" "$@"
          EOF
          
          chmod +x AppDir/AppRun AppDir/TranscribeEdit.desktop

      - name: Download and Run AppImageTool
        run: |
          APPIMAGE_ARCH=${{ matrix.arch }}
          wget "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-${APPIMAGE_ARCH}.AppImage"
          chmod +x appimagetool-${APPIMAGE_ARCH}.AppImage
          
          # Extract AppImageTool (to avoid FUSE issues in CI environments)
          ./appimagetool-${APPIMAGE_ARCH}.AppImage --appimage-extract
          
          # Build our AppImage
          ARCH=${APPIMAGE_ARCH} ./squashfs-root/AppRun AppDir TranscribeEdit-Linux-${APPIMAGE_ARCH}.AppImage

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TranscribeEdit-Linux-${{ matrix.arch }}
          path: TranscribeEdit-Linux-*.AppImage

  # Optional: Automatically create a GitHub Release when a tag is pushed
  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
