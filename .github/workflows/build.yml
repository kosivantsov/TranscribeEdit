name: Build Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows (Lean & Full)
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create required directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin
          New-Item -ItemType Directory -Force -Path translations
          New-Item -ItemType Directory -Force -Path icons

      - name: Build Windows Lean (No Deps)
        shell: pwsh
        run: |
          pyinstaller --noconsole --onefile --name "TranscribeEdit-Lean" `
            --icon="icons/transcribeedit.ico" `
            --add-data "icons;icons" `
            --add-data "translations;translations" `
            --hidden-import mpv `
            main.py
          
          # Manually zip the Lean executable
          Compress-Archive -Path dist/TranscribeEdit-Lean.exe -DestinationPath dist/TranscribeEdit-Windows-Lean-x86_64.zip

      - name: Download Windows External Dependencies (FFmpeg & mpv)
        shell: pwsh
        run: |
          Write-Host "Downloading FFmpeg..."
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_temp
          Copy-Item "ffmpeg_temp/ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe" bin/
          Copy-Item "ffmpeg_temp/ffmpeg-master-latest-win64-gpl/bin/ffprobe.exe" bin/
          
          Write-Host "Downloading MPV..."
          $mpvRelease = Invoke-RestMethod -Uri "https://api.github.com/repos/zhongfly/mpv-winbuild/releases/latest"
          $mpvAsset = $mpvRelease.assets | Where-Object { $_.name -match "mpv-dev-.*x86_64-.*\.7z" } | Select-Object -First 1
          Invoke-WebRequest -Uri $mpvAsset.browser_download_url -OutFile "mpv.7z"
          
          7z e mpv.7z -r libmpv-2.dll -obin
          Rename-Item bin/libmpv-2.dll mpv-2.dll

      - name: Build Windows Full (Bundled Deps Folder)
        shell: pwsh
        run: |
          pyinstaller --noconsole --name "TranscribeEdit-Full" `
            --icon="icons/transcribeedit.ico" `
            --add-binary "bin/ffmpeg.exe;bin" `
            --add-binary "bin/ffprobe.exe;bin" `
            --add-binary "bin/mpv-2.dll;bin" `
            --add-data "icons;icons" `
            --add-data "translations;translations" `
            --hidden-import mpv `
            main.py
          
          # Manually zip the Full folder
          Compress-Archive -Path dist/TranscribeEdit-Full -DestinationPath dist/TranscribeEdit-Windows-Full-x86_64.zip

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TranscribeEdit-Windows-Zips
          path: dist/*.zip

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-13
          - arch: arm64
            runner: macos-14
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create required directories
        run: mkdir -p bin translations icons

      - name: Build macOS App
        run: |
          pyinstaller --noconsole --windowed --name "TranscribeEdit" \
            --target-arch ${{ matrix.arch }} \
            --icon="icons/transcribeedit.icns" \
            --add-data "icons:icons" \
            --add-data "translations:translations" \
            --hidden-import mpv \
            main.py
          
          # Manually zip the App bundle
          cd dist
          zip -ry TranscribeEdit-macOS-${{ matrix.arch }}.zip TranscribeEdit.app

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TranscribeEdit-macOS-${{ matrix.arch }}-Zip
          path: dist/TranscribeEdit-macOS-*.zip

  build-linux:
    name: Build Linux AppImage (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # Added python3-pyqt5.qtsvg to ensure icons render correctly in the Linux App
          sudo apt-get install -y libgl1 libegl1 libxcb-xinerama0 curl file fuse libfuse2 python3-pyqt5 python3-pyqt5.qtsvg python3-pip python3-venv

      - name: Setup Virtual Environment with System Packages
        run: |
          python3 -m venv --system-site-packages myenv
          source myenv/bin/activate
          python -m pip install --upgrade pip
          
          grep -iv "PyQt5" requirements.txt > req_no_qt.txt || true
          pip install -r req_no_qt.txt
          pip install pyinstaller

      - name: Create required directories
        run: mkdir -p bin translations icons

      - name: Build PyInstaller Folder
        run: |
          source myenv/bin/activate
          pyinstaller --noconsole --name "TranscribeEdit" \
            --icon="icons/transcribeedit.png" \
            --add-data "icons:icons" \
            --add-data "translations:translations" \
            --hidden-import mpv \
            main.py

      - name: Create AppImage Structure
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          
          cp -r dist/TranscribeEdit/* AppDir/usr/bin/
          
          cp icons/transcribeedit.png AppDir/TranscribeEdit.png
          cp icons/transcribeedit.png AppDir/.DirIcon
          cp icons/transcribeedit.png AppDir/usr/share/icons/hicolor/256x256/apps/TranscribeEdit.png
          
          cat << 'EOF' > AppDir/TranscribeEdit.desktop
          [Desktop Entry]
          Name=TranscribeEdit
          Exec=AppRun
          Icon=TranscribeEdit
          Type=Application
          Categories=AudioVideo;
          Terminal=false
          EOF
          
          cat << 'EOF' > AppDir/AppRun
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "${0}")")"
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/bin:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/TranscribeEdit" "$@"
          EOF
          
          chmod +x AppDir/AppRun AppDir/TranscribeEdit.desktop

      - name: Download and Run AppImageTool
        run: |
          APPIMAGE_ARCH=${{ matrix.arch }}
          wget "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-${APPIMAGE_ARCH}.AppImage"
          chmod +x appimagetool-${APPIMAGE_ARCH}.AppImage
          
          ./appimagetool-${APPIMAGE_ARCH}.AppImage --appimage-extract
          
          ARCH=${APPIMAGE_ARCH} ./squashfs-root/AppRun AppDir TranscribeEdit-Linux-${APPIMAGE_ARCH}.AppImage

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TranscribeEdit-Linux-${{ matrix.arch }}
          path: TranscribeEdit-Linux-*.AppImage

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
